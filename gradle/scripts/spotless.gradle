spotless {
    encoding "UTF-8"

    format("dotfiles") {
        target(".gitignore", ".gitattributes", ".editorconfig")

        trimTrailingWhitespace()
        leadingTabsToSpaces()
        endWithNewline()
    }

    kotlin {
        target "src/*/kotlin/astralgenerators/**/*.kt"

        ktlint("1.4.1").setEditorConfigPath("$rootDir/spotless/spotless.ktlint")

        toggleOffOn()
        leadingTabsToSpaces()
        endWithNewline()
    }
}